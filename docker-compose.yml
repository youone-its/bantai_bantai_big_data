version: '3.8'
services:
  kafka:
    build:
      context: ./producer_ingest
      dockerfile: Dockerfile
    image: etsbd-kafka
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  namenode:
    build:
      context: ./store
      dockerfile: Dockerfile
    image: etsbd-hadoop
    platform: linux/amd64
    container_name: hadoop-namenode
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      ENSURE_NAMENODE_DIR: /tmp/hadoop-hadoop/dfs/name
    env_file:
      - ./store/hadoop.env
    command: ["hdfs", "namenode"]

  datanode:
    build:
      context: ./store
      dockerfile: Dockerfile
    image: etsbd-hadoop
    container_name: hadoop-datanode
    depends_on:
      - namenode
    env_file:
      - ./store/hadoop.env
    command: ["hdfs", "datanode"]

  resourcemanager:
    build:
      context: ./store
      dockerfile: Dockerfile
    image: etsbd-hadoop
    container_name: hadoop-resourcemanager
    depends_on:
      - datanode
    ports:
      - "8088:8088"
    env_file:
      - ./store/hadoop.env
    command: ["yarn", "resourcemanager"]

  nodemanager:
    build:
      context: ./store
      dockerfile: Dockerfile
    image: etsbd-hadoop
    container_name: hadoop-nodemanager
    depends_on:
      - resourcemanager
    ports:
      - "8042:8042"
    env_file:
      - ./store/hadoop.env
    command: ["yarn", "nodemanager"]

  # dashboard:
  #   build:
  #     context: ./dashboard
  #     dockerfile: Dockerfile
  #   image: etsbd-dashboard
  #   container_name: etsbd-dashboard
  #   ports:
  #     - "5001:5000"
  #   depends_on:
  #     - kafka
  #   volumes:
  #     - ./medallion/lakehouse_data:/lakehouse_data:ro
  #   environment:
  #     - GOLD_PATH=/lakehouse_data/gold

  spark:
    build:
      context: ./medallion
      dockerfile: Dockerfile
    image: etsbd-spark-medallion
    container_name: spark-medallion
    depends_on:
      - namenode
    volumes:
      - ./medallion:/app
    environment:
      - HDFS_HOST=namenode
      - HDFS_PORT=8020
      - SPARK_LOCAL_IP=127.0.0.1
      - HADOOP_USER_NAME=hadoop
    stdin_open: true
    tty: true
    command: /bin/bash

  backend:
    build:
      context: ./web/BE
      dockerfile: Dockerfile
    image: etsbd-backend
    container_name: etsbd-backend
    depends_on:
      - namenode
    ports:
      - "8000:8000"
    environment:
      - HDFS_HOST=namenode
      - HDFS_PORT=8020
      - WEBHDFS_PORT=9870
      - GOLD_PATH=/lakehouse/gold
